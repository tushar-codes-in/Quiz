<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-green-700 to-emerald-900 min-h-screen flex items-center justify-center text-white">

  <div class="w-[90%] max-w-4xl bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl p-16">

    <!-- START SCREEN -->
    <div id="start-screen" class="w-full text-center">
      <h1 class="text-4xl font-bold mb-6">Are you ready for the test?</h1>
      <button onclick="startQuiz()" class="bg-red-600 px-8 py-4 rounded-xl">Start</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="hidden">

      <h1 id="question" class="hidden text-3xl text-center mb-12"></h1>

      <div id="answer-button" class="hidden grid grid-cols-2 gap-8 mb-12"></div>

      <div id="r1" class="hidden px-6 py-3 rounded-xl mb-6"></div>

      <div class="flex justify-center">
        <button id="nextBtn" class="bg-indigo-600 px-6 py-3 rounded-xl">
          Next
        </button>
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
